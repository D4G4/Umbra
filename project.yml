name: Umbra
options:
  bundleIdPrefix: com.umbramacos
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Developer ID signing for notarized release builds, under the shared
    # D4G4 Developer ID (same identity used by Blink/TMEject). The
    # release script overrides CODE_SIGN_IDENTITY=Manual at archive time
    # for deterministic CI/local builds; Automatic here keeps `xcodebuild
    # build` (plain Debug dev builds) working without a provisioning step.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 6V6FZW3FFN
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: true

packages:
  MenuBarKit:
    url: git@github.com:D4G4/MenuBarKit.git
    from: "0.1.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Umbra:
    type: application
    platform: macOS
    sources:
      - Sources/Umbra
    dependencies:
      - package: MenuBarKit
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: Umbra
        PRODUCT_BUNDLE_IDENTIFIER: com.umbramacos.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Sources/Umbra/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Umbra
        CFBundleDisplayName: Umbra Guard
        LSMinimumSystemVersion: "14.0"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
        # Sparkle auto-update. Appcast hosted on GitHub Pages (gh-pages
        # branch), same pattern as TMEject. SUPublicEDKey is the shared
        # D4G4 EdDSA signing key already used by Blink/TMEject — per
        # Sparkle's own guidance ("you only need one signing key, no
        # matter how many apps"), reused rather than generating a new one.
        SUFeedURL: "https://d4g4.github.io/Umbra/appcast.xml"
        SUPublicEDKey: "agdJmL4C1ciE/qX6oEcxkZgc8fu264R45/vCfg09BKY="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400

  UmbraTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/UmbraTests
      - path: Sources/Umbra/MenuBarGeometry.swift
      - path: Sources/Umbra/DockGeometry.swift
      - path: Sources/Umbra/StripProximity.swift
      - path: Sources/Umbra/DimSetting.swift
      - path: Sources/Umbra/LaunchAtLogin.swift
      - path: Sources/Umbra/AppSettings.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.umbramacos.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Umbra:
    build:
      targets:
        Umbra: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - UmbraTests
